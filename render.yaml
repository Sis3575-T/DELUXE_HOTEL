services:
  - type: web
    name: deluxe-hotel-backend
    env: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    repo: https://github.com/REPLACE_WITH_YOUR_REPO
    branch: main

  - type: static
    name: deluxe-hotel-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    repo: https://github.com/REPLACE_WITH_YOUR_REPO
    branch: main
