services:
  - type: web
    name: abay-grand-hotel-backend
    env: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    branch: main
    envVars:
      - key: BACKEND_URL
        value: https://abay-grand-hotel-nmn9.onrender.com
      - key: FRONTEND_URL
        value: https://abay-grand-hotel-w.vercel.app
      - key: ADMIN_URL
        value: https://abay-grand-hotel-admin.vercel.app
      - key: NODE_ENV
        value: production

  - type: static
    name: abay-grand-hotel-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    branch: main
    envVars:
      - key: VITE_API_URL
        value: https://abay-grand-hotel-nmn9.onrender.com
